esphome:
  name: kuche-co2-sensor
  friendly_name: Küche CO2 Sensor

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino
#Bitte auf Arduino ändern


# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "ESPHOMEDEFAULTKEY"

ota:
  - platform: esphome
    password: "ESPHOMEDEFAULTKEY"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Kuche-Co2-Sensor"
    password: "ESPHOMEDEFAULTKEY"


captive_portal:
# ============================================================
#  CO2 Sensor – SCD41 + SSD1306 OLED 0.96"
#  Layout optimiert für rundes Gehäuse
#  alkly.de Version 1.1 (Optimierte LED Logik)
# ============================================================

# --- I2C Bus (SCD41 + OLED teilen sich den Bus) ---
i2c:
  sda: GPIO04
  scl: GPIO05
  scan: true

# --- SCD41 CO2 Sensor ---
sensor:
  - platform: scd4x
    co2:
      name: "CO2"
      id: "co2_wert"
      on_value:
        then:
          - lambda: |-
              auto call = id(co2_led).turn_on();
              
              // --- Grün: alles gut (<800 ppm) ---
              if (x < 800) {
                call.set_rgb(0.0, 1.0, 0.0);
                call.set_brightness(0.4);
              } 
              // --- Gelb: lüften wäre gut (800–999 ppm) ---
              else if (x < 1000) {
                call.set_rgb(1.0, 0.8, 0.0);
                call.set_brightness(0.6);
              } 
              // --- Orange: bitte lüften (1000–1399 ppm) ---
              else if (x < 1400) {
                call.set_rgb(1.0, 0.3, 0.0);
                call.set_brightness(0.8);
              } 
              // --- Rot: kritisch, sofort lüften (>=1400 ppm) ---
              else {
                call.set_rgb(1.0, 0.0, 0.0);
                call.set_brightness(1.0);
              }
              
              call.perform();

    temperature:
      name: "Temperatur"
      id: temperatur
      filters:
        - offset: -1
            
    humidity:
      name: "Luftfeuchtigkeit"
      id: luftfeuchtigkeit
    update_interval: 30s

  # WiFi Signalstärke
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_db
    update_interval: 60s

# --- Text-Sensor für CO2 Bewertung ---
text_sensor:
  - platform: template
    name: "CO2 Bewertung"
    id: co2_bewertung
    lambda: |-
      if (!id(co2_wert).has_state()) return std::string("---");
      float co2 = id(co2_wert).state;
      if (co2 < 800)  return std::string("GUT");
      if (co2 < 1000) return std::string("OK");
      if (co2 < 1400) return std::string("MAESSIG");
      return std::string("SCHLECHT");
    update_interval: 30s

  - platform: wifi_info
    ip_address:
      name: "IP Adresse"
    ssid:
      name: "SSID"

font:
  - file: "gfonts://Roboto@700"
    id: font_co2_gross
    size: 28
    glyphs: "0123456789."

  - file: "gfonts://Roboto@500"
    id: font_mittel
    size: 12
    glyphs: "0123456789.°C%pmGUTOKMAESIHLN -/"

  - file: "gfonts://Roboto@400"
    id: font_klein
    size: 10
    glyphs: "0123456789.°C%- GUTOKMAESIHLNgutokmaesihlnc"

  - file: "gfonts://Roboto@400"
    id: font_winzig
    size: 8
    glyphs: "0123456789.°C%ABDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz -/:"

# --- OLED Display ---
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    update_interval: 1s
    lambda: |-
      int center_x = 64;

      // --- 1. WIFI STATUS (oben Mitte) ---
      if (id(wifi_signal_db).has_state()) {
        it.filled_circle(center_x, 4, 3);

        float dbm = id(wifi_signal_db).state;
        int bars = 0;
        if (dbm > -50) bars = 4;
        else if (dbm > -60) bars = 3;
        else if (dbm > -70) bars = 2;
        else if (dbm > -80) bars = 1;

        for (int i = 0; i < bars; i++) {
          it.filled_rectangle(center_x + 6 + (i * 3), 7 - (i + 1) * 1, 2, (i + 1) * 2);
        }
      } else {
        it.circle(center_x, 4, 3);
      }

      // --- 2. CO2 WERT + ppm inline ---
      if (id(co2_wert).has_state()) {
        char co2_str[12];
        snprintf(co2_str, sizeof(co2_str), "%.0f", id(co2_wert).state);

        // CO2 Zahl zentriert, leicht nach links versetzt
        it.printf(center_x - 8, 14, id(font_co2_gross), TextAlign::TOP_CENTER, "%s", co2_str);

        // "ppm" klein rechts daneben
        it.printf(center_x + 24, 24, id(font_winzig), TextAlign::TOP_LEFT, "ppm");
      } else {
        it.printf(center_x, 20, id(font_mittel), TextAlign::TOP_CENTER, "---");
      }

      // --- 3. BEWERTUNG (mittig) ---
      if (id(co2_bewertung).has_state()) {
        std::string bewertung = id(co2_bewertung).state;
        it.printf(center_x, 42, id(font_klein), TextAlign::TOP_CENTER, "%s", bewertung.c_str());
      }

      // --- 4. TEMPERATUR (unten links, größer) ---
      if (id(temperatur).has_state()) {
        it.printf(8, 50, id(font_mittel), TextAlign::TOP_LEFT, "%.1f°C", id(temperatur).state);
      }

      // --- 5. LUFTFEUCHTIGKEIT (unten rechts, größer) ---
      if (id(luftfeuchtigkeit).has_state()) {
        it.printf(120, 50, id(font_mittel), TextAlign::TOP_RIGHT, "%.0f%%", id(luftfeuchtigkeit).state);
      }

light:
  - platform: neopixelbus
    type: GRB
    variant: WS2812
    pin: GPIO03
    num_leds: 1
    name: "NeoPixel Status LED"
    id: co2_led
